name: Release Automation

on:
  push:
    tags:
      - 'v*'

jobs:
  # Job 1: Build and publish JS SDK to NPM
  publish-npm:
    name: Build & Publish JS SDK to NPM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Check Fixed Release Version
        run: python3 -m mng_scripts.release check --tag "$GITHUB_REF_NAME"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Install Dependencies
        run: |
          cd sdk_js
          pnpm install --frozen-lockfile

      - name: Run JS SDK Tests
        run: |
          cd sdk_js
          pnpm test

      - name: Build JS SDK
        run: |
          cd sdk_js
          pnpm build

      - name: Publish to NPM
        run: |
          cd sdk_js
          VERSION=${GITHUB_REF_NAME#v}
          NPM_TAG=latest
          if [[ "$VERSION" == *-* ]]; then
            NPM_TAG=next
          fi
          pnpm publish --tag "$NPM_TAG" --provenance --no-git-checks --access public

  # Job 2: Build and publish Docker images to GHCR
  publish-docker:
    name: Build & Publish Docker Images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Check Fixed Release Version
        run: python3 -m mng_scripts.release check --tag "$GITHUB_REF_NAME"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Backend image
      - name: Extract Backend Image Metadata
        id: meta-backend
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/cyanly-backend
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      # Build and push Backend image (contains embedded JS SDK built in Stage 1 of the Dockerfile)
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deployment/single_server_docker/backend.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Extract metadata (tags, labels) for Dashboard image
      - name: Extract Dashboard Image Metadata
        id: meta-dashboard
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/cyanly-dashboard
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      # Build and push Dashboard image
      - name: Build and Push Dashboard Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deployment/single_server_docker/dashboard.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-dashboard.outputs.tags }}
          labels: ${{ steps.meta-dashboard.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 3: Build and publish release binaries to GitHub Release
  publish-release:
    name: Build & Publish Release Pyz Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Check Fixed Release Version
        run: python3 -m mng_scripts.release check --tag "$GITHUB_REF_NAME"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install shiv rich

      - name: Build Installer Pyz Packages
        run: |
          python deployment/build.py

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            deployment/dist/install-cyanly.pyz
            deployment/dist/cyanly.pyz
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Reference Nginx configuration for Cyanly Analytics production deployments.
# Place this or include it in your main nginx.conf.

# Define rate limiting zones based on client IP
# Limit requests to /collect to 30 requests per minute (0.5/s) per IP, with a burst of 10.
limit_req_zone $binary_remote_addr zone=cyanly_collect_limit:10m rate=30r/m;

# Limit API queries to 120 requests per minute (2/s) per IP.
limit_req_zone $binary_remote_addr zone=cyanly_api_limit:10m rate=120r/m;

upstream cyanly_collector {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream cyanly_query_api {
    server 127.0.0.1:8081;
    keepalive 16;
}

server {
    listen 80;
    server_name analytics.yourdomain.com;

    # Redirect all HTTP traffic to HTTPS (recommended for production)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name analytics.yourdomain.com;

    # SSL Configuration (Update paths to your certificates)
    # ssl_certificate /etc/letsencrypt/live/analytics.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/analytics.yourdomain.com/privkey.pem;
    # include /etc/nginx/snippets/ssl-params.conf;

    # 1. Event Collector Ingestion Ingress
    location /collect {
        limit_req zone=cyanly_collect_limit burst=10 nodelay;

        # Strict payload size limit to prevent memory exhaustion (e.g. max 10KB per event)
        client_max_body_size 10k;

        proxy_pass http://cyanly_collector;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Pass client real IP and headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS Headers handled by Go backend. 
        # Nginx can also override/enforce them here if needed.
    }

    # 2. Ticket Token Request Ingress (Used by your backend server to request session tokens)
    location /api/v1/tokens {
        # Restrict access to this endpoint to internal IPs or your application servers only (Recommended)
        # allow 10.0.0.0/8;
        # deny all;

        client_max_body_size 5k;
        proxy_pass http://cyanly_collector;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Query API Ingress (Accessed by Dashboard UI)
    location /api/v1/analytics/ {
        limit_req zone=cyanly_api_limit burst=20 nodelay;

        client_max_body_size 50k;
        proxy_pass http://cyanly_query_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny all other paths
    location / {
        return 404;
    }
}
